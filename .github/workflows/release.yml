name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  build_windows:
    name: Build Windows Release
    needs: preflight
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows desktop artifact
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
        run: |
          $version = $env:RELEASE_VERSION.TrimStart('v')
          $args = @(
            'run',
            'dist:desktop:artifact',
            '--',
            '--platform', 'win',
            '--target', 'nsis',
            '--arch', 'x64',
            '--build-version', $version,
            '--verbose'
          )

          $hasSigningSecrets = @(
            $env:AZURE_TENANT_ID,
            $env:AZURE_CLIENT_ID,
            $env:AZURE_CLIENT_SECRET,
            $env:AZURE_TRUSTED_SIGNING_ENDPOINT,
            $env:AZURE_TRUSTED_SIGNING_ACCOUNT_NAME,
            $env:AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME,
            $env:AZURE_TRUSTED_SIGNING_PUBLISHER_NAME
          ) -notcontains ''

          if ($hasSigningSecrets) {
            Write-Host 'Windows signing enabled.'
            $args += '--signed'
          } else {
            Write-Host 'Windows signing disabled.'
          }

          & bun @args

      - name: Collect Windows release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-publish | Out-Null

          $patterns = @(
            'release/*.exe',
            'release/*.blockmap',
            'release/latest*.yml'
          )

          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_.FullName -Destination release-publish
            }
          }

          $assetCount = (Get-ChildItem -Path release-publish -File).Count
          if ($assetCount -eq 0) {
            Write-Error 'No Windows release assets were collected.'
          }

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v7
        with:
          name: desktop-win-x64
          path: release-publish/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build_windows
    runs-on: ubuntu-24.04
    steps:
      - name: Download Windows desktop artifacts
        uses: actions/download-artifact@v8
        with:
          name: desktop-win-x64
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: T3 Code ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/latest*.yml
          fail_on_unmatched_files: true
